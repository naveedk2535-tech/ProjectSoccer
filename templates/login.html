<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ProjectSoccer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .field-pattern {
            background-image:
                linear-gradient(rgba(16, 185, 129, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(16, 185, 129, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="bg-[#0a0e17] text-gray-100 min-h-screen flex items-center justify-center field-pattern">
    <div class="w-full max-w-md mx-4">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-emerald-500 via-green-500 to-teal-600 shadow-lg shadow-green-500/20 mb-4">
                <svg class="w-10 h-10 text-white" viewBox="0 0 24 24" fill="currentColor">
                    <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93c-.52.07-1.06.07-1.58.07-.53 0-1.06 0-1.58-.07C7.02 18.1 5 15.27 5 12c0-1.3.37-2.51 1-3.54L8.3 10l.7 2.5L12 14l3-1.5.7-2.5 2.3-1.54c.63 1.03 1 2.24 1 3.54 0 3.27-2.02 6.1-4.84 7.93z"/>
                    <polygon points="12,6 13.5,9 12,10.5 10.5,9" fill="currentColor" opacity="0.6"/>
                </svg>
            </div>
            <h1 class="text-3xl font-black text-white tracking-tight">Project<span class="text-emerald-400">Soccer</span></h1>
            <p class="text-sm text-gray-500 mt-1">Prediction Engine & Betting Analytics</p>
        </div>

        <!-- Login Form -->
        <div class="bg-[#111827]/80 backdrop-blur-xl rounded-2xl border border-gray-800 p-8 shadow-2xl">
            {% if error %}
            <div class="bg-red-900/30 border border-red-800/50 rounded-lg px-4 py-3 mb-6 text-sm text-red-400">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" class="space-y-5">
                <div>
                    <label class="block text-xs text-gray-400 uppercase tracking-wider mb-2">Username</label>
                    <input type="text" name="username" required autofocus
                           class="w-full px-4 py-3 rounded-xl bg-[#0a0e17] border border-gray-700 text-white placeholder-gray-600 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 focus:outline-none transition"
                           placeholder="Enter username">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 uppercase tracking-wider mb-2">Password</label>
                    <input type="password" name="password" required
                           class="w-full px-4 py-3 rounded-xl bg-[#0a0e17] border border-gray-700 text-white placeholder-gray-600 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 focus:outline-none transition"
                           placeholder="Enter password">
                </div>
                <button type="submit"
                        class="w-full py-3 rounded-xl bg-gradient-to-r from-emerald-600 to-green-500 hover:from-emerald-500 hover:to-green-400 text-white font-semibold text-sm transition shadow-lg shadow-green-500/20">
                    Sign In
                </button>
            </form>
        </div>

        <p class="text-center text-xs text-gray-700 mt-6">Powered by Poisson + Elo + XGBoost + Sentiment</p>
    </div>
</body>
</html>
